<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ComeWealth Live — Gemini Voice</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #111128;
            --border: #1a1a3e;
            --text: #e0e0f0;
            --muted: #8888aa;
            --blue: #627EEA;
            --green: #00d4aa;
            --red: #ff4466;
            --purple: #9B59B6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        /* Orb */
        .orb-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--blue), var(--purple), #1a1a3e);
            opacity: 0.3;
            transition: all 0.5s ease;
            position: relative;
        }

        .orb.listening {
            opacity: 1;
            animation: orb-pulse 1.5s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(98,126,234,0.4), 0 0 120px rgba(155,89,182,0.2);
        }

        .orb.speaking {
            opacity: 1;
            animation: orb-speak 0.3s ease-in-out infinite alternate;
            background: radial-gradient(circle at 35% 35%, var(--green), var(--blue), #1a1a3e);
            box-shadow: 0 0 60px rgba(0,212,170,0.4), 0 0 120px rgba(98,126,234,0.2);
        }

        .orb.connecting {
            opacity: 0.6;
            animation: orb-connect 2s linear infinite;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.08); }
        }

        @keyframes orb-speak {
            0% { transform: scale(1); }
            100% { transform: scale(1.12); }
        }

        @keyframes orb-connect {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .status {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 24px;
            min-height: 1.4em;
        }

        .status.active { color: var(--green); }
        .status.error { color: var(--red); }

        /* Buttons */
        .btn {
            width: 180px;
            padding: 14px 0;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 6px;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white;
        }

        .btn-start:hover { transform: scale(1.05); box-shadow: 0 4px 20px rgba(98,126,234,0.4); }

        .btn-stop {
            background: var(--red);
            color: white;
        }

        .btn-stop:hover { transform: scale(1.05); }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
            transform: none !important;
        }

        /* Transcript */
        .transcript {
            margin-top: 30px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            max-height: 200px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .transcript:empty { display: none; }

        .transcript .user { color: var(--blue); }
        .transcript .ai { color: var(--green); }
        .transcript .system { color: var(--muted); font-style: italic; font-size: 0.8rem; }

        /* Settings */
        .settings {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .settings select {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.8rem;
            margin: 4px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--muted);
        }

        .footer a { color: var(--blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 ComeWealth Live</h1>
        <p class="subtitle">Gemini Live API — Real-time Voice</p>

        <div class="orb-container">
            <div class="orb" id="orb"></div>
        </div>

        <div class="status" id="status">Tap to start conversation</div>

        <div>
            <button class="btn btn-start" id="startBtn" onclick="startSession()">🎙️ Start</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopSession()" disabled>⏹️ Stop</button>
        </div>

        <div class="settings">
            <label>Voice:
                <select id="voiceSelect">
                    <option value="Puck">Puck</option>
                    <option value="Charon">Charon</option>
                    <option value="Kore">Kore</option>
                    <option value="Fenrir">Fenrir</option>
                    <option value="Aoede" selected>Aoede</option>
                </select>
            </label>
            <label>Language:
                <select id="langSelect">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="auto" selected>Auto</option>
                </select>
            </label>
        </div>

        <div class="transcript" id="transcript"></div>

        <div class="footer">
            <p>Powered by Gemini 2.5 Flash Native Audio</p>
            <p><a href="https://agentic-sciences.github.io/gdc2026/">GDC 2026</a> · <a href="https://agentic-sciences.github.io/ethereumsf2026/">EthereumSF</a></p>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDop3ML88di3R40o4bkiCIx3uLblaEU1M0';
        const MODEL = 'gemini-2.5-flash-native-audio-latest';
        const WS_URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${API_KEY}`;

        let ws = null;
        let audioContext = null;
        let mediaStream = null;
        let processor = null;
        let playbackQueue = [];
        let isPlaying = false;

        const orb = document.getElementById('orb');
        const status = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const transcript = document.getElementById('transcript');

        function setStatus(text, className = '') {
            status.textContent = text;
            status.className = 'status ' + className;
        }

        function addTranscript(text, role = 'system') {
            const div = document.createElement('div');
            div.className = role;
            div.textContent = (role === 'user' ? '🎤 ' : role === 'ai' ? '🤖 ' : '⚙️ ') + text;
            transcript.appendChild(div);
            transcript.scrollTop = transcript.scrollHeight;
        }

        async function startSession() {
            try {
                startBtn.disabled = true;
                orb.className = 'orb connecting';
                setStatus('Connecting...', '');

                // Get microphone
                mediaStream = await navigator.mediaDevices.getUserMedia({
                    audio: {
                        sampleRate: 16000,
                        channelCount: 1,
                        echoCancellation: true,
                        noiseSuppression: true
                    }
                });

                audioContext = new AudioContext({ sampleRate: 16000 });

                // Connect WebSocket
                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    // Send setup message
                    const voice = document.getElementById('voiceSelect').value;
                    const lang = document.getElementById('langSelect').value;

                    let systemInstruction = "You are ComeWealth (来财), a quantitative research AI assistant. You speak naturally in conversation. ";
                    if (lang === 'zh') systemInstruction += "Please respond in Chinese (Mandarin).";
                    else if (lang === 'en') systemInstruction += "Please respond in English.";
                    else systemInstruction += "Respond in whatever language the user speaks.";

                    const setup = {
                        setup: {
                            model: `models/${MODEL}`,
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: {
                                            voiceName: voice
                                        }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: systemInstruction }]
                            }
                        }
                    };

                    ws.send(JSON.stringify(setup));
                    addTranscript('Connected to Gemini Live', 'system');
                };

                ws.onmessage = async (event) => {
                    let data;
                    if (event.data instanceof Blob) {
                        data = JSON.parse(await event.data.text());
                    } else {
                        data = JSON.parse(event.data);
                    }

                    // Setup complete
                    if (data.setupComplete) {
                        setStatus('🎙️ Listening...', 'active');
                        orb.className = 'orb listening';
                        stopBtn.disabled = false;
                        startStreamingAudio();
                        addTranscript('Ready! Start speaking...', 'system');
                        return;
                    }

                    // Server content (audio response)
                    if (data.serverContent) {
                        const parts = data.serverContent.modelTurn?.parts || [];
                        for (const part of parts) {
                            if (part.inlineData && part.inlineData.mimeType?.startsWith('audio/')) {
                                orb.className = 'orb speaking';
                                setStatus('🔊 Speaking...', 'active');
                                await playAudio(part.inlineData.data);
                            }
                            if (part.text) {
                                addTranscript(part.text, 'ai');
                            }
                        }

                        if (data.serverContent.turnComplete) {
                            orb.className = 'orb listening';
                            setStatus('🎙️ Listening...', 'active');
                        }
                    }
                };

                ws.onerror = (err) => {
                    console.error('WS error:', err);
                    setStatus('Connection error', 'error');
                    orb.className = 'orb';
                    cleanup();
                };

                ws.onclose = () => {
                    setStatus('Disconnected', '');
                    orb.className = 'orb';
                    cleanup();
                };

            } catch (err) {
                console.error(err);
                setStatus('Error: ' + err.message, 'error');
                orb.className = 'orb';
                cleanup();
            }
        }

        function startStreamingAudio() {
            const source = audioContext.createMediaStreamSource(mediaStream);

            // Use ScriptProcessor for wider compatibility
            processor = audioContext.createScriptProcessor(4096, 1, 1);

            processor.onaudioprocess = (e) => {
                if (!ws || ws.readyState !== WebSocket.OPEN) return;

                const float32 = e.inputBuffer.getChannelData(0);
                // Convert to 16-bit PCM
                const int16 = new Int16Array(float32.length);
                for (let i = 0; i < float32.length; i++) {
                    int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32768)));
                }

                // Base64 encode
                const bytes = new Uint8Array(int16.buffer);
                let binary = '';
                for (let i = 0; i < bytes.length; i++) {
                    binary += String.fromCharCode(bytes[i]);
                }
                const b64 = btoa(binary);

                // Send to Gemini
                ws.send(JSON.stringify({
                    realtimeInput: {
                        mediaChunks: [{
                            mimeType: "audio/pcm;rate=16000",
                            data: b64
                        }]
                    }
                }));
            };

            source.connect(processor);
            processor.connect(audioContext.destination);
        }

        async function playAudio(base64Data) {
            try {
                const binaryStr = atob(base64Data);
                const bytes = new Uint8Array(binaryStr.length);
                for (let i = 0; i < binaryStr.length; i++) {
                    bytes[i] = binaryStr.charCodeAt(i);
                }

                // Try decoding as audio
                const playCtx = new AudioContext({ sampleRate: 24000 });
                try {
                    const audioBuffer = await playCtx.decodeAudioData(bytes.buffer.slice(0));
                    const source = playCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(playCtx.destination);
                    source.start();
                } catch {
                    // Raw PCM - assume 24kHz 16-bit mono
                    const int16 = new Int16Array(bytes.buffer);
                    const float32 = new Float32Array(int16.length);
                    for (let i = 0; i < int16.length; i++) {
                        float32[i] = int16[i] / 32768;
                    }
                    const audioBuffer = playCtx.createBuffer(1, float32.length, 24000);
                    audioBuffer.getChannelData(0).set(float32);
                    const source = playCtx.createBufferSource();
                    source.buffer = audioBuffer;
                    source.connect(playCtx.destination);
                    source.start();
                }
            } catch (err) {
                console.error('Audio playback error:', err);
            }
        }

        function stopSession() {
            addTranscript('Session ended', 'system');
            setStatus('Tap to start conversation', '');
            if (ws) { ws.close(); ws = null; }
            cleanup();
        }

        function cleanup() {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            if (processor) { processor.disconnect(); processor = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (audioContext) { audioContext.close().catch(()=>{}); audioContext = null; }
            orb.className = 'orb';
        }
    </script>
</body>
</html>
