<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <title>ComeWealth Live — Gemini Voice</title>
    <style>
        :root {
            --bg: #0a0a1a;
            --card: #111128;
            --border: #1a1a3e;
            --text: #e0e0f0;
            --muted: #8888aa;
            --blue: #627EEA;
            --green: #00d4aa;
            --red: #ff4466;
            --purple: #9B59B6;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            min-height: 100dvh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 20px;
            overflow: hidden;
        }

        .container {
            max-width: 420px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.5rem;
            margin-bottom: 4px;
            background: linear-gradient(135deg, var(--blue), var(--purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .subtitle {
            color: var(--muted);
            font-size: 0.85rem;
            margin-bottom: 30px;
        }

        /* Orb */
        .orb-container {
            position: relative;
            width: 200px;
            height: 200px;
            margin: 0 auto 30px;
        }

        .orb {
            width: 200px;
            height: 200px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, var(--blue), var(--purple), #1a1a3e);
            opacity: 0.3;
            transition: all 0.4s ease;
            position: relative;
        }

        .orb.listening {
            opacity: 1;
            animation: orb-pulse 2s ease-in-out infinite;
            box-shadow: 0 0 60px rgba(98,126,234,0.4), 0 0 120px rgba(155,89,182,0.2);
        }

        .orb.speaking {
            opacity: 1;
            animation: orb-speak 0.4s ease-in-out infinite alternate;
            background: radial-gradient(circle at 35% 35%, var(--green), var(--blue), #1a1a3e);
            box-shadow: 0 0 60px rgba(0,212,170,0.4), 0 0 120px rgba(98,126,234,0.2);
        }

        .orb.connecting {
            opacity: 0.6;
            animation: orb-rotate 2s linear infinite;
        }

        @keyframes orb-pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.06); }
        }

        @keyframes orb-speak {
            0% { transform: scale(1); }
            100% { transform: scale(1.1); }
        }

        @keyframes orb-rotate {
            0% { opacity: 0.4; }
            50% { opacity: 0.7; }
            100% { opacity: 0.4; }
        }

        .status {
            font-size: 0.9rem;
            color: var(--muted);
            margin-bottom: 24px;
            min-height: 1.4em;
        }

        .status.active { color: var(--green); }
        .status.error { color: var(--red); }

        .btn {
            width: 180px;
            padding: 14px 0;
            border: none;
            border-radius: 30px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            margin: 6px;
            -webkit-tap-highlight-color: transparent;
        }

        .btn-start {
            background: linear-gradient(135deg, var(--blue), var(--purple));
            color: white;
        }
        .btn-start:active { transform: scale(0.95); }

        .btn-stop {
            background: var(--red);
            color: white;
        }
        .btn-stop:active { transform: scale(0.95); }

        .btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .transcript {
            margin-top: 30px;
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 16px;
            max-height: 180px;
            overflow-y: auto;
            text-align: left;
            font-size: 0.85rem;
            line-height: 1.6;
        }

        .transcript:empty { display: none; }
        .transcript .user { color: var(--blue); }
        .transcript .ai { color: var(--green); }
        .transcript .system { color: var(--muted); font-style: italic; font-size: 0.8rem; }

        .settings {
            margin-top: 20px;
            font-size: 0.8rem;
            color: var(--muted);
        }

        .settings select {
            background: var(--card);
            color: var(--text);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 6px 10px;
            font-size: 0.8rem;
            margin: 4px;
        }

        .footer {
            margin-top: 30px;
            font-size: 0.75rem;
            color: var(--muted);
        }
        .footer a { color: var(--blue); text-decoration: none; }
    </style>
</head>
<body>
    <div class="container">
        <h1>💰 ComeWealth Live</h1>
        <p class="subtitle">Gemini Live API — Real-time Voice</p>

        <div class="orb-container">
            <div class="orb" id="orb"></div>
        </div>

        <div class="status" id="status">Tap Start to begin</div>

        <div>
            <button class="btn btn-start" id="startBtn" onclick="startSession()">🎙️ Start</button>
            <button class="btn btn-stop" id="stopBtn" onclick="stopSession()" disabled>⏹️ Stop</button>
        </div>

        <div class="settings">
            <label>Voice:
                <select id="voiceSelect">
                    <option value="Puck">Puck</option>
                    <option value="Charon">Charon</option>
                    <option value="Kore">Kore</option>
                    <option value="Fenrir">Fenrir</option>
                    <option value="Aoede" selected>Aoede</option>
                </select>
            </label>
            <label>Lang:
                <select id="langSelect">
                    <option value="zh">中文</option>
                    <option value="en">English</option>
                    <option value="auto" selected>Auto</option>
                </select>
            </label>
        </div>

        <div class="transcript" id="transcript"></div>

        <div class="footer">
            <p>Powered by Gemini 2.5 Flash Native Audio</p>
            <p><a href="https://agentic-sciences.github.io/gdc2026/">GDC 2026</a> · <a href="https://agentic-sciences.github.io/ethereumsf2026/">EthereumSF</a></p>
        </div>
    </div>

    <script>
        const API_KEY = 'AIzaSyDop3ML88di3R40o4bkiCIx3uLblaEU1M0';
        const MODEL = 'gemini-2.5-flash-native-audio-latest';
        const WS_URL = `wss://generativelanguage.googleapis.com/ws/google.ai.generativelanguage.v1beta.GenerativeService.BidiGenerateContent?key=${API_KEY}`;

        let ws = null;
        let inputCtx = null;
        let mediaStream = null;
        let workletNode = null;
        let playbackCtx = null;
        let audioQueue = [];
        let isPlayingAudio = false;
        let isMuted = false; // mute mic while AI speaks

        const orb = document.getElementById('orb');
        const statusEl = document.getElementById('status');
        const startBtn = document.getElementById('startBtn');
        const stopBtn = document.getElementById('stopBtn');
        const transcriptEl = document.getElementById('transcript');

        function setStatus(text, cls = '') {
            statusEl.textContent = text;
            statusEl.className = 'status ' + cls;
        }

        function log(text, role = 'system') {
            const d = document.createElement('div');
            d.className = role;
            const prefix = role === 'user' ? '🎤 ' : role === 'ai' ? '🤖 ' : '⚙️ ';
            d.textContent = prefix + text;
            transcriptEl.appendChild(d);
            transcriptEl.scrollTop = transcriptEl.scrollHeight;
        }

        // ── Audio Playback (queued, smooth) ──
        function initPlayback() {
            if (!playbackCtx) {
                playbackCtx = new AudioContext({ sampleRate: 24000 });
            }
        }

        function queueAudio(base64Data) {
            // Decode base64 to Int16 PCM
            const raw = atob(base64Data);
            const bytes = new Uint8Array(raw.length);
            for (let i = 0; i < raw.length; i++) bytes[i] = raw.charCodeAt(i);

            const int16 = new Int16Array(bytes.buffer);
            const float32 = new Float32Array(int16.length);
            for (let i = 0; i < int16.length; i++) float32[i] = int16[i] / 32768;

            audioQueue.push(float32);
            if (!isPlayingAudio) drainQueue();
        }

        async function drainQueue() {
            if (audioQueue.length === 0) {
                isPlayingAudio = false;
                isMuted = false;
                orb.className = 'orb listening';
                setStatus('🎙️ Listening...', 'active');
                return;
            }

            isPlayingAudio = true;
            isMuted = true; // mute mic to prevent echo
            orb.className = 'orb speaking';
            setStatus('🔊 Speaking...', 'active');

            initPlayback();

            // Merge all queued chunks for smoother playback
            let totalLen = 0;
            for (const chunk of audioQueue) totalLen += chunk.length;
            const merged = new Float32Array(totalLen);
            let offset = 0;
            for (const chunk of audioQueue) {
                merged.set(chunk, offset);
                offset += chunk.length;
            }
            audioQueue = [];

            const buf = playbackCtx.createBuffer(1, merged.length, 24000);
            buf.getChannelData(0).set(merged);

            const source = playbackCtx.createBufferSource();
            source.buffer = buf;
            source.connect(playbackCtx.destination);

            source.onended = () => {
                // Small delay then check for more
                setTimeout(() => drainQueue(), 100);
            };

            source.start();
        }

        // ── Mic Input via AudioWorklet (or ScriptProcessor fallback) ──
        async function startMic() {
            mediaStream = await navigator.mediaDevices.getUserMedia({
                audio: {
                    sampleRate: 16000,
                    channelCount: 1,
                    echoCancellation: true,
                    noiseSuppression: true,
                    autoGainControl: true
                }
            });

            inputCtx = new AudioContext({ sampleRate: 16000 });
            const source = inputCtx.createMediaStreamSource(mediaStream);

            // Try AudioWorklet first, fall back to ScriptProcessor
            try {
                const workletCode = `
                    class PCMProcessor extends AudioWorkletProcessor {
                        constructor() {
                            super();
                            this.buffer = new Float32Array(0);
                        }
                        process(inputs) {
                            const input = inputs[0][0];
                            if (!input) return true;

                            // Accumulate ~100ms chunks (1600 samples at 16kHz)
                            const newBuf = new Float32Array(this.buffer.length + input.length);
                            newBuf.set(this.buffer);
                            newBuf.set(input, this.buffer.length);
                            this.buffer = newBuf;

                            if (this.buffer.length >= 1600) {
                                this.port.postMessage(this.buffer);
                                this.buffer = new Float32Array(0);
                            }
                            return true;
                        }
                    }
                    registerProcessor('pcm-processor', PCMProcessor);
                `;

                const blob = new Blob([workletCode], { type: 'application/javascript' });
                const url = URL.createObjectURL(blob);
                await inputCtx.audioWorklet.addModule(url);
                URL.revokeObjectURL(url);

                workletNode = new AudioWorkletNode(inputCtx, 'pcm-processor');
                workletNode.port.onmessage = (e) => {
                    if (isMuted || !ws || ws.readyState !== WebSocket.OPEN) return;
                    sendAudioChunk(e.data);
                };
                source.connect(workletNode);
                workletNode.connect(inputCtx.destination);
                console.log('Using AudioWorklet');
            } catch (err) {
                // Fallback to ScriptProcessor
                console.log('Fallback to ScriptProcessor:', err.message);
                const proc = inputCtx.createScriptProcessor(2048, 1, 1);
                proc.onaudioprocess = (e) => {
                    if (isMuted || !ws || ws.readyState !== WebSocket.OPEN) return;
                    sendAudioChunk(e.inputBuffer.getChannelData(0));
                };
                source.connect(proc);
                proc.connect(inputCtx.destination);
            }
        }

        function sendAudioChunk(float32) {
            const int16 = new Int16Array(float32.length);
            for (let i = 0; i < float32.length; i++) {
                int16[i] = Math.max(-32768, Math.min(32767, Math.round(float32[i] * 32768)));
            }
            const bytes = new Uint8Array(int16.buffer);
            let bin = '';
            for (let i = 0; i < bytes.length; i++) bin += String.fromCharCode(bytes[i]);
            const b64 = btoa(bin);

            ws.send(JSON.stringify({
                realtimeInput: {
                    mediaChunks: [{
                        mimeType: "audio/pcm;rate=16000",
                        data: b64
                    }]
                }
            }));
        }

        // ── Session Management ──
        async function startSession() {
            try {
                startBtn.disabled = true;
                orb.className = 'orb connecting';
                setStatus('Connecting...', '');

                await startMic();

                ws = new WebSocket(WS_URL);

                ws.onopen = () => {
                    const voice = document.getElementById('voiceSelect').value;
                    const lang = document.getElementById('langSelect').value;

                    let sysText = "You are ComeWealth (来财), a friendly and knowledgeable AI research assistant created by Agentic Sciences. Keep responses concise and conversational. ";
                    if (lang === 'zh') sysText += "Always respond in Chinese (Mandarin).";
                    else if (lang === 'en') sysText += "Always respond in English.";
                    else sysText += "Respond in the same language the user speaks.";

                    ws.send(JSON.stringify({
                        setup: {
                            model: `models/${MODEL}`,
                            generationConfig: {
                                responseModalities: ["AUDIO"],
                                speechConfig: {
                                    voiceConfig: {
                                        prebuiltVoiceConfig: { voiceName: voice }
                                    }
                                }
                            },
                            systemInstruction: {
                                parts: [{ text: sysText }]
                            }
                        }
                    }));
                };

                ws.onmessage = async (event) => {
                    let data;
                    if (event.data instanceof Blob) {
                        data = JSON.parse(await event.data.text());
                    } else {
                        data = JSON.parse(event.data);
                    }

                    if (data.setupComplete) {
                        setStatus('🎙️ Listening...', 'active');
                        orb.className = 'orb listening';
                        stopBtn.disabled = false;
                        log('Connected! Start speaking...', 'system');
                        return;
                    }

                    if (data.serverContent) {
                        const parts = data.serverContent.modelTurn?.parts || [];
                        for (const part of parts) {
                            if (part.inlineData?.data) {
                                queueAudio(part.inlineData.data);
                            }
                            if (part.text) {
                                log(part.text, 'ai');
                            }
                        }

                        if (data.serverContent.turnComplete) {
                            // Audio queue will handle the transition back to listening
                            if (!isPlayingAudio) {
                                orb.className = 'orb listening';
                                setStatus('🎙️ Listening...', 'active');
                                isMuted = false;
                            }
                        }
                    }
                };

                ws.onerror = (err) => {
                    console.error('WS error:', err);
                    setStatus('Connection error — try again', 'error');
                    cleanup();
                };

                ws.onclose = (e) => {
                    if (e.code !== 1000) {
                        setStatus(`Disconnected (${e.code})`, 'error');
                    } else {
                        setStatus('Session ended', '');
                    }
                    cleanup();
                };

            } catch (err) {
                console.error(err);
                if (err.name === 'NotAllowedError') {
                    setStatus('⚠️ Microphone permission denied', 'error');
                } else {
                    setStatus('Error: ' + err.message, 'error');
                }
                cleanup();
            }
        }

        function stopSession() {
            log('Session ended', 'system');
            if (ws) { ws.close(1000); ws = null; }
            cleanup();
        }

        function cleanup() {
            startBtn.disabled = false;
            stopBtn.disabled = true;
            isMuted = false;
            isPlayingAudio = false;
            audioQueue = [];
            if (workletNode) { workletNode.disconnect(); workletNode = null; }
            if (mediaStream) { mediaStream.getTracks().forEach(t => t.stop()); mediaStream = null; }
            if (inputCtx) { inputCtx.close().catch(()=>{}); inputCtx = null; }
            orb.className = 'orb';
            if (!statusEl.classList.contains('error')) setStatus('Tap Start to begin', '');
        }
    </script>
</body>
</html>
